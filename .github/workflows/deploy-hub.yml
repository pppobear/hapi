name: Deploy Hub via Tailscale

on:
    push:
        branches:
            - deploy-infra
        paths:
            - 'cli/**'
            - 'hub/**'
            - 'shared/**'
            - 'web/**'
            - 'package.json'
            - 'bun.lock'
            - '.github/workflows/deploy-hub.yml'
            - 'scripts/build-and-deploy-hapi-workspace.sh'
            - 'scripts/deploy-hapi-release.sh'
            - 'scripts/download-tunwg-binaries.sh'
            - 'scripts/install-hapi-user-services.sh'
            - 'scripts/resolve-hapi-deploy-config.sh'
            - 'scripts/sync-hapi-source-to-remote.sh'
            - 'docs/fork-deploy.md'
    workflow_dispatch:
        inputs:
            git_ref:
                description: Git ref to deploy
                required: false
                default: deploy-infra
                type: string
            restart_runner:
                description: Restart hapi-runner after deploy
                required: false
                default: true
                type: boolean

permissions:
    contents: read
    id-token: write

concurrency:
    group: hapi-hub-deploy
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            HAPI_DEPLOY_HOST: ${{ vars.HAPI_DEPLOY_HOST }}
            HAPI_DEPLOY_USER: ${{ vars.HAPI_DEPLOY_USER }}
            HAPI_DEPLOY_KEEP_RELEASES: ${{ vars.HAPI_DEPLOY_KEEP_RELEASES }}
            HAPI_DEPLOY_ROOT: ${{ vars.HAPI_DEPLOY_ROOT }}
            HAPI_DEPLOY_REPO_PATH: ${{ vars.HAPI_DEPLOY_REPO_PATH }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.git_ref || github.ref }}

            - name: Resolve deploy configuration
              env:
                  DEPLOY_SSH_KEY: ${{ secrets.HAPI_DEPLOY_SSH_KEY }}
                  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  TS_AUDIENCE: ${{ secrets.TS_AUDIENCE }}
              run: bash scripts/resolve-hapi-deploy-config.sh

            - name: Connect to Tailscale
              uses: tailscale/github-action@v4
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  audience: ${{ secrets.TS_AUDIENCE }}
                  tags: tag:ci
                  ping: ${{ vars.HAPI_DEPLOY_HOST }}

            - name: Configure SSH
              run: |
                  set -euo pipefail
                  install -d -m 700 ~/.ssh
                  printf '%s\n' '${{ secrets.HAPI_DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -H "$HAPI_DEPLOY_HOST" >> ~/.ssh/known_hosts

            - name: Download tunwg binaries
              run: bash scripts/download-tunwg-binaries.sh /tmp/tunwg

            - name: Sync source to remote
              run: bash scripts/sync-hapi-source-to-remote.sh

            - name: Build and activate on remote
              env:
                  RESTART_RUNNER_INPUT: ${{ inputs.restart_runner }}
              run: |
                  set -euo pipefail

                  restart_runner="${RESTART_RUNNER_INPUT:-true}"
                  if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" || -z "$restart_runner" ]]; then
                      restart_runner="true"
                  fi

                  ssh "$DEPLOY_TARGET" \
                      "HAPI_DEPLOY_ROOT='${HAPI_DEPLOY_ROOT}' \
                      HAPI_DEPLOY_KEEP_RELEASES='${HAPI_DEPLOY_KEEP_RELEASES}' \
                      HAPI_DEPLOY_RESTART_RUNNER='${restart_runner}' \
                      HAPI_DEPLOY_SOURCE_PATH='${HAPI_DEPLOY_SOURCE_PATH}' \
                      GITHUB_SHA='${GITHUB_SHA}' \
                      bash -s" < scripts/build-and-deploy-hapi-workspace.sh
