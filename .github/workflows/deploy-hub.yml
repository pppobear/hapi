name: Deploy Hub via Tailscale

on:
    push:
        branches:
            - deploy-infra
        paths:
            - 'cli/**'
            - 'hub/**'
            - 'shared/**'
            - 'web/**'
            - 'package.json'
            - 'bun.lock'
            - '.github/workflows/deploy-hub.yml'
            - 'scripts/deploy-hapi-release.sh'
            - 'scripts/install-hapi-user-services.sh'
            - 'docs/fork-deploy.md'
    workflow_dispatch:
        inputs:
            git_ref:
                description: Git ref to deploy
                required: false
                default: deploy-infra
                type: string
            restart_runner:
                description: Restart hapi-runner after deploy
                required: false
                default: true
                type: boolean

permissions:
    contents: read
    id-token: write

concurrency:
    group: hapi-hub-deploy
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            HAPI_DEPLOY_HOST: ${{ vars.HAPI_DEPLOY_HOST }}
            HAPI_DEPLOY_USER: ${{ vars.HAPI_DEPLOY_USER }}
            HAPI_DEPLOY_KEEP_RELEASES: ${{ vars.HAPI_DEPLOY_KEEP_RELEASES }}
            HAPI_DEPLOY_ROOT: ${{ vars.HAPI_DEPLOY_ROOT }}
            HAPI_DEPLOY_REPO_PATH: ${{ vars.HAPI_DEPLOY_REPO_PATH }}
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.inputs.git_ref || github.ref }}

            - name: Validate deploy configuration
              env:
                  DEPLOY_SSH_KEY: ${{ secrets.HAPI_DEPLOY_SSH_KEY }}
                  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  TS_AUDIENCE: ${{ secrets.TS_AUDIENCE }}
              run: |
                  set -euo pipefail

                  : "${DEPLOY_SSH_KEY:?Missing secret HAPI_DEPLOY_SSH_KEY}"
                  : "${TS_OAUTH_CLIENT_ID:?Missing secret TS_OAUTH_CLIENT_ID}"
                  : "${TS_AUDIENCE:?Missing secret TS_AUDIENCE}"
                  : "${HAPI_DEPLOY_HOST:?Missing repository variable HAPI_DEPLOY_HOST}"

                  if [[ -z "${HAPI_DEPLOY_USER:-}" ]]; then
                      HAPI_DEPLOY_USER="enoch"
                  fi
                  if [[ -z "${HAPI_DEPLOY_KEEP_RELEASES:-}" ]]; then
                      HAPI_DEPLOY_KEEP_RELEASES="5"
                  fi
                  if [[ -z "${HAPI_DEPLOY_ROOT:-}" ]]; then
                      HAPI_DEPLOY_ROOT="/home/${HAPI_DEPLOY_USER}/.local/share/hapi-deploy"
                  fi
                  if [[ -z "${HAPI_DEPLOY_REPO_PATH:-}" ]]; then
                      HAPI_DEPLOY_REPO_PATH="/home/${HAPI_DEPLOY_USER}/projects/hapi"
                  fi

                  {
                      echo "HAPI_DEPLOY_USER=$HAPI_DEPLOY_USER"
                      echo "HAPI_DEPLOY_KEEP_RELEASES=$HAPI_DEPLOY_KEEP_RELEASES"
                      echo "HAPI_DEPLOY_ROOT=$HAPI_DEPLOY_ROOT"
                      echo "HAPI_DEPLOY_REPO_PATH=$HAPI_DEPLOY_REPO_PATH"
                  } >> "$GITHUB_ENV"

            - name: Connect to Tailscale
              uses: tailscale/github-action@v4
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  audience: ${{ secrets.TS_AUDIENCE }}
                  tags: tag:ci
                  ping: ${{ vars.HAPI_DEPLOY_HOST }}

            - name: Configure SSH
              run: |
                  set -euo pipefail
                  install -d -m 700 ~/.ssh
                  printf '%s\n' '${{ secrets.HAPI_DEPLOY_SSH_KEY }}' > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  ssh-keyscan -H "$HAPI_DEPLOY_HOST" >> ~/.ssh/known_hosts

            - name: Set deploy target
              run: |
                  set -euo pipefail

                  deploy_target="${HAPI_DEPLOY_USER}@${HAPI_DEPLOY_HOST}"
                  echo "DEPLOY_TARGET=$deploy_target" >> "$GITHUB_ENV"

            - name: Build and activate on remote
              run: |
                  set -euo pipefail

                  restart_runner="${{ github.event.inputs.restart_runner }}"
                  if [[ -z "$restart_runner" ]]; then
                      restart_runner="true"
                  fi

                  git_ref="${{ github.event.inputs.git_ref || github.ref_name }}"

                  ssh "$DEPLOY_TARGET" \
                      "HAPI_DEPLOY_ROOT='${HAPI_DEPLOY_ROOT}' \
                      HAPI_DEPLOY_KEEP_RELEASES='${HAPI_DEPLOY_KEEP_RELEASES}' \
                      HAPI_DEPLOY_RESTART_RUNNER='${restart_runner}' \
                      HAPI_DEPLOY_REPO_PATH='${HAPI_DEPLOY_REPO_PATH}' \
                      GIT_REF='${git_ref}' \
                      GITHUB_SHA='${GITHUB_SHA}' \
                      bash -s" <<'EOF'
                  set -euo pipefail

                  export PATH="$HOME/.bun/bin:$HOME/.npm-global/bin:/usr/local/bin:/usr/bin:$PATH"

                  repo_path="${HAPI_DEPLOY_REPO_PATH}"
                  build_root="${HAPI_DEPLOY_ROOT}/builds"
                  build_path="${build_root}/${GITHUB_SHA}"

                  install -d "$build_root"

                  cleanup() {
                      git -C "$repo_path" worktree remove --force "$build_path" >/dev/null 2>&1 || true
                  }
                  trap cleanup EXIT

                  cd "$repo_path"
                  git fetch --depth=1 origin "$GIT_REF"

                  git worktree remove --force "$build_path" >/dev/null 2>&1 || true
                  git worktree add --force --detach "$build_path" FETCH_HEAD

                  cd "$build_path"
                  bun install --frozen-lockfile
                  bun run build:single-exe

                  binary_path="$build_path/cli/dist-exe/bun-linux-x64-baseline/hapi"
                  test -x "$binary_path"

                  HAPI_DEPLOY_ROOT="$HAPI_DEPLOY_ROOT" \
                  HAPI_DEPLOY_KEEP_RELEASES="$HAPI_DEPLOY_KEEP_RELEASES" \
                  HAPI_DEPLOY_RESTART_RUNNER="$HAPI_DEPLOY_RESTART_RUNNER" \
                      bash scripts/deploy-hapi-release.sh "$GITHUB_SHA" "$binary_path"
                  EOF
